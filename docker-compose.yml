version: '3'
services:
  backend:
    container_name: backend
    image: snoony/starlight-be
    ports:
      - "8080:8080"
    networks:
      - network
  frontend:
    container_name : frontend
    image: snoony/starlight-fe
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - network
